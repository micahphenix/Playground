name: EAS Build (iOS)

# Manually triggered from the Actions tab. Kicks off a native iOS build on
# EAS servers using the stored EXPO_TOKEN; install the result from the link
# on expo.dev. OTA updates cannot fix an expired/unlaunchable binary — this
# workflow exists for exactly that case.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: eas.json build profile
        type: choice
        options:
          - production
          - preview
          - development
        default: production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Typecheck and test
        run: |
          npx tsc --noEmit
          npx jest --ci

      - name: Kick off EAS build
        run: eas build --platform ios --profile "${{ inputs.profile }}" --non-interactive --no-wait
